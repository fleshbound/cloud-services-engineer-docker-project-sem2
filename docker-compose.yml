version: '3.9'

services:
  backend:
    container_name: momo-store-backend
    read_only: true
    build:
      context: ./backend
      dockerfile: Dockerfile
    networks:
      - backend-network
    ports:
      - "8081:8081"
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/health"]
      interval: 30s 
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
      mode: replicated
      replicas: 2
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

  frontend:
    container_name: momo-store-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    networks:
      - frontend_network
    volumes:
      - frontend_static:/app/static
    restart: no

  nginx:
    container_name: momo-store-gateway
    read_only: true
    build:
      context: ./nginx
      dockerfile: Dockerfile
    networks:
      - backend_network
      - frontend_network
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_completed_successfully
    volumes:
      - frontend_static:/app/static:ro
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - CHOWN

volumes:
  frontend_static:
    
networks:
  backend_network:
    driver: bridge
    internal: true
  frontend_network:
    driver: bridge
