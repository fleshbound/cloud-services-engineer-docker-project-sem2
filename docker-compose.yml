x-defaults: &defaults
  restart: "always"
  env_file: .env

services:
  backend:
    <<: *defaults
    container_name: momo-store-backend-${ENV:-dev}
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${BACKEND_VERSION:-latest}
        GO_VERSION: ${GO_VERSION:-1.21}
    networks:
      - backend_network
    read_only: true
    ports:
      - "${BACKEND_PORT:-8081}:8081"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:${BACKEND_PORT:-8081}/health"]
      interval: 30s 
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
      mode: replicated
      replicas: ${BACKEND_REPLICA_COUNT:-2}
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    tmpfs:
      - /tmp:size=64M,mode=1777

  frontend:
    <<: *defaults
    container_name: momo-store-frontend-${ENV:-dev}
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NODE_VERSION: ${NODE_VERSION:-20}
        APP_VERSION: ${FRONTEND_VERSION:-latest}
    networks:
      - frontend_network
    volumes:
      - frontend_static:/app/static
    restart: "no"

  nginx:
    <<: *defaults
    container_name: momo-store-gateway-${ENV:-dev}
    build:
      context: ./nginx
      dockerfile: Dockerfile
    networks:
      - backend_network
      - frontend_network
    ports:
      - "${GATEWAY_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_completed_successfully
    volumes:
      - frontend_static:/app/static:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - CHOWN
    tmpfs:
      - /tmp:size=64M,mode=1777

volumes:
  frontend_static:
    
networks:
  backend_network:
    driver: bridge
    internal: true
  frontend_network:
    driver: bridge
